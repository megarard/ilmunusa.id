<!DOCTYPE html>
<html>
<head>
  <title>Login IlmuNusa</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 250px;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      padding: 10px 20px;
      background: #0077ff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005fcc;
    }
  </style>

</head>
<body>

<div class="box">
  <h2>Login IlmuNusa 🎓</h2>

  <input type="text" placeholder="Username"><br>
  <input type="password" placeholder="Password"><br>

  <button onclick="window.location.href='dashboard.html'">
    Masuk
  </button>
</div>

</body>
</html>
