<!DOCTYPE html>
<html>
<head>
  <title>Login IlmuNusa</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 260px;
    }

    input, select {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      padding: 10px 20px;
      background: #0077ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #005fcc;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login IlmuNusa 🎓</h2>

  <input type="text" id="nama" placeholder="Masukkan Nama"><br>

  <select id="role">
    <option value="student">Siswa</option>
    <option value="teacher">Guru</option>
  </select><br>

  <button onclick="masuk()">Masuk</button>
</div>

<script>
function masuk() {
  let nama = document.getElementById("nama").value;
  let role = document.getElementById("role").value;

  if(nama === ""){
    alert("Isi nama dulu yaa 😆");
    return;
  }

  let email;

  if(role === "student"){
    email = nama.toLowerCase() + "@ilmunusa.student";
  } else {
    email = nama.toLowerCase() + "@ilmunusa.teacher";
  }

  localStorage.setItem("nama", nama);
  localStorage.setItem("email", email);
  localStorage.setItem("role", role);

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>    }
